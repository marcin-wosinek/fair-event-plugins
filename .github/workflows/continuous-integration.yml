name: Continuous integration

permissions:
    contents: read

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup PHP
              uses: shivammathur/setup-php@fcafdd6392932010c2bd5094439b8e33be2a8a09 # 2.37.0
              with:
                  php-version: '8.2'
                  extensions: mbstring, intl, zip
                  coverage: none

            - name: Validate composer.json for all plugins
              run: |
                  npm run composer:validate

            - name: Cache Composer packages
              id: composer-cache
              uses: actions/cache@v5
              with:
                  path: |
                      ./fair-payment/vendor
                      ./fair-events/vendor
                      ./fair-platform/vendor
                      ./fair-audience/vendor
                      ./vendor
                  key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php-

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Cache node_modules
              id: npm-cache
              uses: actions/cache@v5
              with:
                  path: |
                      ./node_modules
                      ./fair-events/node_modules
                      ./fair-payment/node_modules
                      ./fair-platform/node_modules
                      ./fair-audience/node_modules
                      ./fair-events-shared/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install npm dependencies
              if: steps.npm-cache.outputs.cache-hit != 'true'
              run: npm ci --prefer-offline

            - name: Install WP-CLI
              run: |
                  curl -L -o wp-cli.phar https://github.com/wp-cli/wp-cli/releases/download/v2.12.0/wp-cli-2.12.0.phar
                  echo "be928f6b8ca1e8dfb9d2f4b75a13aa4aee0896f8a9a0a1c45cd5d2c98605e6172e6d014dda2e27f88c98befc16c040cbb2bd1bfa121510ea5cdf5f6a30fe8832  wp-cli.phar" | sha512sum -c -
                  chmod +x wp-cli.phar
                  sudo mv wp-cli.phar /usr/local/bin/wp
                  wp --info

            - name: Install WP-CLI dist-archive command
              run: |
                  wp package install wp-cli/dist-archive-command:^3.1
                  wp package list
                  wp dist-archive --help

            - name: Install regular PHP dependencies in all plugins
              run: npm run composer:install:prod

            - name: Build JavaScript for all plugins
              run: npm run build

            - name: Stamp build version in plugin headers
              run: node scripts/stamp-build-version.js

            - name: Create plugin ZIP files using wp dist-archive
              run: |
                  npm run dist-archive
                  echo "Contents of dist directory:"
                  ls -lah ./dist/ || echo "dist directory not found"

            - name: Install dev PHP dependencies in all plugins
              run: npm run composer:install

            - name: Run unit tests
              run: |
                  npm test

            - name: Upload plugins
              uses: actions/upload-artifact@v6
              with:
                  name: plugins
                  path: ./dist/*.zip
                  retention-days: 7
                  if-no-files-found: error

    release:
        name: Create Release PR
        runs-on: ubuntu-latest
        needs: [build]
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Cache node_modules
              id: npm-cache
              uses: actions/cache@v5
              with:
                  path: |
                      ./node_modules
                      ./fair-events/node_modules
                      ./fair-payment/node_modules
                      ./fair-platform/node_modules
                      ./fair-audience/node_modules
                      ./fair-events-shared/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              if: steps.npm-cache.outputs.cache-hit != 'true'
              run: HUSKY=0 npm ci --prefer-offline

            - name: Create Release Pull Request
              uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
              with:
                  version: npm run version-packages
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    general-release:
        name: General release
        runs-on: ubuntu-latest
        needs: [build]
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: plugins
                  path: ./dist

            - name: Checkout for git describe
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  path: repo

            - name: Create GitHub release
              run: |
                  BUILD_ID="$(git -C repo describe --tags --match='[0-9]*')"
                  if gh release view "build-${BUILD_ID}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
                    echo "Release build-${BUILD_ID} already exists, skipping."
                  else
                    gh release create "build-${BUILD_ID}" ./dist/*.zip \
                      --repo "$GITHUB_REPOSITORY" \
                      --title "Build ${BUILD_ID}" \
                      --notes "Automated build from commit ${GITHUB_SHA}" \
                      --prerelease
                  fi
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
