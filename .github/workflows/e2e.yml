name: E2E

permissions:
    contents: read

on:
    pull_request:
        branches: [main]
        paths:
            - 'fair-payment/**'
            - 'fair-events/**'
            - 'fair-audience/**'
            - 'fair-platform/**'
            - 'fair-events-shared/**'
            - 'e2e/**'
            - 'playwright.config.js'
            - '.wp-env.json'
            - '.github/workflows/e2e.yml'

jobs:
    e2e:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@fcafdd6392932010c2bd5094439b8e33be2a8a09 # 2.37.0
              with:
                  php-version: '8.3'
                  extensions: mbstring, intl, zip
                  coverage: none

            - name: Cache Composer packages
              uses: actions/cache@v5
              with:
                  path: |
                      ./fair-payment/vendor
                      ./fair-events/vendor
                      ./fair-platform/vendor
                      ./fair-audience/vendor
                      ./vendor
                  key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php-

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Cache node_modules
              id: npm-cache
              uses: actions/cache@v5
              with:
                  path: |
                      ./node_modules
                      ./fair-events/node_modules
                      ./fair-payment/node_modules
                      ./fair-platform/node_modules
                      ./fair-audience/node_modules
                      ./fair-events-shared/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install npm dependencies
              if: steps.npm-cache.outputs.cache-hit != 'true'
              run: HUSKY=0 npm ci --prefer-offline

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Boot isolated WordPress env
              run: npm run test:e2e:setup

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Tear down WordPress env
              if: always()
              run: npm run test:e2e:teardown

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-report
                  path: |
                      playwright-report/
                      test-results/
                  retention-days: 7
                  if-no-files-found: ignore
