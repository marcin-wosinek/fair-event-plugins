name: Deploy to Environment

on:
    workflow_call:
        inputs:
            environment:
                description: 'Environment to deploy to'
                required: true
                type: string
            release_tag:
                description: 'GitHub release tag to deploy (e.g., build-1.0.0)'
                required: true
                type: string

permissions:
    contents: read

jobs:
    deploy:
        name: Deploy to ${{ inputs.environment }}
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}

        steps:
            - name: Download release assets
              run: |
                  mkdir -p dist
                  gh release download "${{ inputs.release_tag }}" \
                    --repo "$GITHUB_REPOSITORY" \
                    --pattern "*.zip" \
                    --dir ./dist
                  echo "Downloaded assets:"
                  ls -la ./dist/
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract plugin ZIPs
              run: |
                  mkdir -p extracted-plugins
                  cd dist
                  for zip in *.zip; do
                    if [ -f "$zip" ]; then
                      echo "Extracting $zip..."
                      unzip -q "$zip" -d ../extracted-plugins/
                    fi
                  done
                  cd ..
                  ls -la extracted-plugins/

            - name: Setup SSH
              uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Add SSH host key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ vars.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

            - name: Deploy plugins via rsync
              id: rsync
              run: |
                  MAX_ATTEMPTS=2
                  SSH_OPTS="-p ${{ vars.SSH_PORT }} -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"

                  # Get plugins to deploy from environment variable
                  PLUGINS_TO_DEPLOY="${{ vars.PLUGINS_TO_DEPLOY }}"

                  if [ -z "$PLUGINS_TO_DEPLOY" ]; then
                    echo "ERROR: PLUGINS_TO_DEPLOY variable not set for environment ${{ inputs.environment }}"
                    exit 1
                  fi

                  if [ "$PLUGINS_TO_DEPLOY" = "all" ]; then
                    PLUGINS="fair-events fair-payment fair-audience"
                  else
                    # Convert comma-separated list to space-separated
                    PLUGINS=$(echo "$PLUGINS_TO_DEPLOY" | tr ',' ' ')
                  fi

                  echo "Deploying plugins: $PLUGINS"
                  echo "Release: ${{ inputs.release_tag }}"
                  echo ""

                  # Deploy each plugin from extracted directory
                  DEPLOYED_COUNT=0
                  SKIPPED_COUNT=0
                  DEPLOYED_PLUGINS=""

                  for plugin in $PLUGINS; do
                    if [ -d "extracted-plugins/$plugin" ]; then
                      echo "Deploying $plugin..."

                      ATTEMPT=1
                      while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
                        if timeout 300 rsync -avz --delete \
                          -e "ssh $SSH_OPTS" \
                          "extracted-plugins/$plugin/" \
                          "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.WORDPRESS_PLUGINS_PATH }}/$plugin/"; then
                          echo "✓ $plugin deployed successfully"
                          break
                        fi

                        echo "Attempt $ATTEMPT/$MAX_ATTEMPTS failed for $plugin"
                        if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                          echo "ERROR: Failed to deploy $plugin after $MAX_ATTEMPTS attempts"
                          exit 1
                        fi
                        echo "Retrying in 10 seconds..."
                        sleep 10
                        ATTEMPT=$((ATTEMPT + 1))
                      done

                      echo ""
                      DEPLOYED_PLUGINS="${DEPLOYED_PLUGINS} ${plugin}"
                      DEPLOYED_COUNT=$((DEPLOYED_COUNT + 1))
                    else
                      echo "⚠ $plugin directory not found in extracted-plugins/, skipping..."
                      echo ""
                      SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                    fi
                  done

                  echo "deployed_plugins=${DEPLOYED_PLUGINS}" >> "$GITHUB_OUTPUT"

                  echo "========================================="
                  echo "Deployment Summary:"
                  echo "  Release: ${{ inputs.release_tag }}"
                  echo "  Deployed: $DEPLOYED_COUNT plugin(s)"
                  echo "  Skipped: $SKIPPED_COUNT plugin(s)"
                  echo "  Target: ${{ vars.SSH_HOST }}"
                  echo "========================================="

            - name: Reactivate plugins via WP-CLI
              run: |
                  SSH_OPTS="-p ${{ vars.SSH_PORT }} -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
                  REMOTE="${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}"
                  WP_PATH="${{ vars.WORDPRESS_PLUGINS_PATH }}/../.."

                  for plugin in ${{ steps.rsync.outputs.deployed_plugins }}; do
                    echo "Reactivating $plugin..."
                    if ssh $SSH_OPTS "$REMOTE" "cd $WP_PATH && wp plugin deactivate $plugin && wp plugin activate $plugin"; then
                      echo "✓ $plugin reactivated"
                    else
                      echo "⚠ Failed to reactivate $plugin (plugin may not have been active)"
                    fi
                  done
