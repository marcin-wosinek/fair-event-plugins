name: Deploy from release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Release tag to deploy (e.g., build-1.0.0)'
                required: true
                type: string
            acroyoga-club-es:
                description: 'acroyoga-club.es'
                type: boolean
                default: false
            fair-event-plugins-com:
                description: 'fair-event-plugins.com'
                type: boolean
                default: false
            lamutable-es:
                description: 'lamutable.es'
                type: boolean
                default: false
            fusion-dance-es:
                description: 'fusion-dance.es'
                type: boolean
                default: false
            acro-agenda-es:
                description: 'acro-agenda.es'
                type: boolean
                default: false
            fusion-circus-com:
                description: 'fusion-circus.com'
                type: boolean
                default: false

jobs:
    resolve:
        name: Resolve release
        runs-on: ubuntu-latest
        outputs:
            release_tag: ${{ steps.resolve.outputs.release_tag }}
            is_clean_version: ${{ steps.resolve.outputs.is_clean_version }}
        steps:
            - name: Resolve release tag and version type
              id: resolve
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                    TAG="${{ github.event.release.tag_name }}"
                  else
                    TAG="${{ inputs.release_tag }}"
                  fi

                  echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

                  # Strip "build-" prefix to get the version
                  VERSION="${TAG#build-}"

                  # Check if it's a clean semver (no -N-gHASH suffix)
                  if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "is_clean_version=true" >> "$GITHUB_OUTPUT"
                    echo "Clean version: ${VERSION}"
                  else
                    echo "is_clean_version=false" >> "$GITHUB_OUTPUT"
                    echo "Dirty version: ${VERSION}"
                  fi

    deploy-acroyoga:
        name: Deploy to acroyoga-club.es
        needs: [resolve]
        if: |
            needs.resolve.outputs.is_clean_version == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.acroyoga-club-es)
        uses: ./.github/workflows/deploy-to-environment.yml
        with:
            environment: acroyoga-club.es
            release_tag: ${{ needs.resolve.outputs.release_tag }}
        secrets: inherit

    deploy-fair-event-plugins:
        name: Deploy to fair-event-plugins.com
        needs: [resolve]
        if: |
            needs.resolve.outputs.is_clean_version == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.fair-event-plugins-com)
        uses: ./.github/workflows/deploy-to-environment.yml
        with:
            environment: fair-event-plugins.com
            release_tag: ${{ needs.resolve.outputs.release_tag }}
        secrets: inherit

    deploy-lamutable:
        name: Deploy to lamutable.es
        needs: [resolve]
        if: |
            needs.resolve.outputs.is_clean_version == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.lamutable-es)
        uses: ./.github/workflows/deploy-to-environment.yml
        with:
            environment: lamutable.es
            release_tag: ${{ needs.resolve.outputs.release_tag }}
        secrets: inherit

    deploy-fusion-dance:
        name: Deploy to fusion-dance.es
        needs: [resolve]
        if: |
            needs.resolve.outputs.is_clean_version == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.fusion-dance-es)
        uses: ./.github/workflows/deploy-to-environment.yml
        with:
            environment: fusion-dance.es
            release_tag: ${{ needs.resolve.outputs.release_tag }}
        secrets: inherit

    deploy-acro-agenda:
        name: Deploy to acro-agenda.es
        needs: [resolve]
        if: |
            needs.resolve.outputs.is_clean_version == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.acro-agenda-es)
        uses: ./.github/workflows/deploy-to-environment.yml
        with:
            environment: acro-agenda.es
            release_tag: ${{ needs.resolve.outputs.release_tag }}
        secrets: inherit

    deploy-fusion-circus:
        name: Deploy to fusion-circus.com
        needs: [resolve]
        if: |
            needs.resolve.outputs.is_clean_version == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.fusion-circus-com)
        uses: ./.github/workflows/deploy-to-environment.yml
        with:
            environment: fusion-circus.com
            release_tag: ${{ needs.resolve.outputs.release_tag }}
        secrets: inherit
